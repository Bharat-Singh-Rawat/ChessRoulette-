# Fly.io app config. Run `fly launch --copy-config` to register an app name
# and region; that command will rewrite `app` and `primary_region` for you.

app = "chessroulette"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  # SQLite lives on the persistent volume mounted at /data
  DATABASE_URL = "file:/data/prod.db"
  AUTH_TRUST_HOST = "true"
  NODE_ENV = "production"

# Persistent volume for the SQLite database (10 GB is overkill but cheap).
# Run `fly volumes create data --size 10 --region iad` before first deploy.
[mounts]
  source = "data"
  destination = "/data"

[http_service]
  internal_port = 3000
  force_https = true
  # WebSocket connections must stay open — don't auto-stop the machine.
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512
